# 可选：本地没有 MySQL 时用 Docker 起一个（生产环境请直接用服务器已有 MySQL）
services:
  mysql:
    image: mysql:8.0
    container_name: zhejian-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_dev_pass
      MYSQL_DATABASE: zhejian
      MYSQL_USER: zhejian
      MYSQL_PASSWORD: zhejian_dev_pass
    ports:
      - "3306:3306"
    volumes:
      - zhejian_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uzhejian", "-pzhejian_dev_pass"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  zhejian_mysql_data:
