server {
    listen 443 ssl http2;
    server_name geo.simplewin.cn;

    # SSL 证书路径按阿里云/ certbot 实际安装位置修改
    ssl_certificate     /etc/nginx/ssl/geo.simplewin.cn/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/geo.simplewin.cn/privkey.pem;

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
    }

    location / {
        # H5 公开页或静态站点（后续部署 official-web）
        root /var/www/geo.simplewin.cn;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name geo.simplewin.cn;
    return 301 https://$host$request_uri;
}
