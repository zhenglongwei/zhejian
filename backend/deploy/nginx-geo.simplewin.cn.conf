server {
    listen 443 ssl http2;
    server_name geo.simplewin.cn;

    # SSL 证书路径按阿里云实际安装位置修改
    ssl_certificate     /etc/nginx/ssl/geo.simplewin.cn/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/geo.simplewin.cn/privkey.pem;

    client_max_body_size 20m;

    # 辙见 · 主业务 API（小程序 / 后台共用）
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
    }

    # 盈简科技 · 辙见运营后台（admin-web 构建产物：/var/www/geo.simplewin.cn/admin/）
    location /admin/ {
        root /var/www/geo.simplewin.cn;
        try_files $uri $uri/ /admin/index.html;
    }

    # SEO/GEO 公开内容（案例 H5 等，仅脱敏素材）
    location / {
        root /var/www/geo.simplewin.cn/public;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name geo.simplewin.cn;
    return 301 https://$host$request_uri;
}

# simplewin.cn 为公司官网，独立部署，不在此配置
