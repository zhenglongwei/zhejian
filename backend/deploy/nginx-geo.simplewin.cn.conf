# 辙见 · geo.simplewin.cn
# B-INF-02：/api/ 必须优先于 H5/Next 根路径反代到 Node :3000
# 安装：sudo bash scripts/server-install.sh（自动替换下方 __SSL_*__ 占位符）
# 若域名已有 Next.js 站点：只合并 deploy/nginx-api-location.snippet.conf，勿整站覆盖

server {
    listen 443 ssl http2;
    server_name geo.simplewin.cn;

    ssl_certificate     __SSL_CERTIFICATE__;
    ssl_certificate_key __SSL_CERTIFICATE_KEY__;

    client_max_body_size 20m;

    # 【P0】主业务 API — 勿被 Next/H5 根 location 覆盖
    location /api/ {
        proxy_pass http://127.0.0.1:__ZHEJIAN_API_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # B-MEDIA：相册/咨询图片静态访问（须优先于根 location）
    location /media/ {
        proxy_pass http://127.0.0.1:__ZHEJIAN_API_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    location = /admin {
        return 301 /admin/;
    }
    location /admin/ {
        alias /var/www/zhejian/admin-web/placeholder/;
        index index.html;
    }

    # 静态 H5 案例页（与 Next 共存时，仅匹配仓库内已有 html）
    location /case/ {
        alias /var/www/zhejian/h5/case/;
        try_files $uri =404;
    }

    location /shared/ {
        alias /var/www/zhejian/h5/shared/;
        try_files $uri =404;
    }

    # 根路径 · 静态首页（需 h5/index.html）
    location / {
        root /var/www/zhejian/h5;
        index index.html;
        try_files $uri $uri/ =404;
    }
}

server {
    listen 80;
    server_name geo.simplewin.cn;
    return 301 https://$host$request_uri;
}
