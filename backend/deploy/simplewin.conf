# simplewin.conf · ECS 生产 Nginx 真源（与 /etc/nginx/conf.d/simplewin.conf 保持同步）
#
# 部署：
#   sudo cp /var/www/zhejian/backend/deploy/simplewin.conf /etc/nginx/conf.d/simplewin.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# 端口约定：
#   simplewin.cn 官网 Next.js  → 127.0.0.1:3000
#   geo.simplewin.cn 辙见 API   → 127.0.0.1:3100（backend/.env PORT=3100）
#
# geo 块变更时请同步更新：backend/deploy/nginx-geo.simplewin.cn.conf（独立模板，含 __SSL_*__ 占位符）
#
# B-TRACK-04 爬虫 UA 日志：在 /etc/nginx/nginx.conf 的 http {} 内 include：
#   include /var/www/zhejian/backend/deploy/nginx-http-crawler-map.conf;
# 并在下方 geo 公开页 location 启用 crawler_track access_log（见各 location 注释）

server {
    listen 80 default_server;
    server_name 8.155.0.128 _ localhost;
    root /var/www/simplewin/web/dist;
    index index.html;

    location = /h5 {
        return 302 /h5/tools;
    }

    location ^~ /h5/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /uploads/ {
        alias /var/www/simplewin/web/uploads/;
        autoindex on;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 80;
    server_name simplewin.cn;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name simplewin.cn;
    root /var/www/simplewin/web/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/simplewin.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/simplewin.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = /h5 {
        return 302 /h5/tools;
    }

    location ^~ /h5/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /uploads/ {
        alias /var/www/simplewin/web/uploads/;
        autoindex on;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── geo.simplewin.cn · 辙见（API :3100 + H5 静态 /var/www/zhejian/h5）────────
server {
    listen 80;
    server_name geo.simplewin.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name geo.simplewin.cn;

    ssl_certificate /etc/letsencrypt/live/geo.simplewin.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/geo.simplewin.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    # B-INSP-01 · AI 检查（Vision + LLM）单次请求可达 1～3 分钟，须放宽反代超时
    location /api/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 240s;
        proxy_read_timeout 240s;
    }

    location /media/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }

    # admin-web · Vue SPA（base: /admin/；构建产物 admin-web/dist/）
    location = /admin {
        return 301 /admin/;
    }

    location ^~ /admin/assets/ {
        alias /var/www/zhejian/admin-web/dist/assets/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location = /admin/index.html {
        alias /var/www/zhejian/admin-web/dist/index.html;
        expires -1;
    }

    location = /admin/ {
        rewrite ^ /admin/index.html last;
    }

    # SPA 路由回退（须排除 assets/，且 assets 用 ^~ 前缀优先）
    location ~ ^/admin/(?!assets/).+ {
        rewrite ^ /admin/index.html last;
    }

    location = /robots.txt {
        proxy_pass http://127.0.0.1:3100/api/v1/public/robots.txt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /llms.txt {
        proxy_pass http://127.0.0.1:3100/api/v1/public/llms.txt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /feeds/topics.xml {
        proxy_pass http://127.0.0.1:3100/api/v1/public/feeds/topics.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GEO-IGAIN-B05 · JSON Feed 裸路径（RAG 友好）
    location ^~ /public/v1/ {
        proxy_pass http://127.0.0.1:3100/api/v1/public/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 240s;
        add_header Cache-Control "public, max-age=300" always;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3100/api/v1/public/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/sitemap-[a-z]+\.xml$ {
        rewrite ^/(sitemap-[a-z]+\.xml)$ /api/v1/public/$1 break;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /case {
        return 301 /case/;
    }

    location = /case/view.html {
        if ($crawler_bot_type != "") {
            rewrite ^ /api/v1/public/h5/case/$arg_id/bot-html? last;
        }
        set $case_slug_redirect 0;
        if ($arg_id != "") {
            set $case_slug_redirect 1;
        }
        if ($arg_legacy = "1") {
            set $case_slug_redirect 0;
        }
        if ($case_slug_redirect = 1) {
            rewrite ^ /api/v1/public/h5/case-redirect?id=$arg_id? last;
        }
        alias /var/www/zhejian/h5/case/view.html;
        access_log /var/www/zhejian/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location ~ ^/case/(?!index\.html$)[a-zA-Z0-9_-]+\.html$ {
        if ($crawler_bot_type != "") {
            rewrite ^/case/([a-zA-Z0-9_-]+)\.html$ /api/v1/public/h5/case/$1/bot-html? last;
        }
        root /var/www/zhejian/h5;
        try_files /case/view.html =404;
        access_log /var/www/zhejian/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    # 案例列表 index.html；alias 不可与 try_files 同用（403）
    location /case/ {
        alias /var/www/zhejian/h5/case/;
        index index.html;
        access_log /var/www/zhejian/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    # 门店列表 /store/ → index.html；详情 PRD：/store/{store_id}.html
    # 注意：勿用宽泛 regex 匹配 index.html，否则列表页会误进 view.html
    location = /store {
        return 301 /store/;
    }

    location = /store/ {
        rewrite ^ /store/index.html last;
    }

    location = /store/index.html {
        alias /var/www/zhejian/h5/store/index.html;
        access_log /var/www/zhejian/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location = /store/view.html {
        alias /var/www/zhejian/h5/store/view.html;
        access_log /var/www/zhejian/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location ~ ^/store/[a-zA-Z0-9_-]+/cases/?$ {
        root /var/www/zhejian/h5;
        try_files /store/cases.html =404;
        access_log /var/www/zhejian/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    # Bot 预渲染门店页（透明度指标 + Schema 证据链）
    location ~ ^/store/([a-zA-Z0-9_-]+)\.html$ {
        set $store_id $1;
        if ($http_user_agent ~* "(GPTBot|ChatGPT-User|ClaudeBot|Claude-Web|Googlebot|bingbot|Bytespider|PerplexityBot|Amazonbot)") {
            rewrite ^ /api/v1/public/h5/stores/$store_id/bot-html? last;
        }
        root /var/www/zhejian/h5;
        try_files /store/view.html =404;
        access_log /var/www/zhejian/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location = /service/view.html {
        alias /var/www/zhejian/h5/service/view.html;
        access_log /var/www/zhejian/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location ~ ^/service/[a-zA-Z0-9_-]+/cases/?$ {
        root /var/www/zhejian/h5;
        try_files /service/cases.html =404;
        access_log /var/www/zhejian/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location ~ ^/service/[a-zA-Z0-9_-]+\.html$ {
        root /var/www/zhejian/h5;
        try_files /service/view.html =404;
        access_log /var/www/zhejian/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location ~ ^/topic/[a-z0-9-]+/?$ {
        root /var/www/zhejian/h5;
        try_files /topic/index.html =404;
        access_log /var/www/zhejian/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location = /city {
        return 301 /city/hangzhou;
    }

    location ~ ^/city/[a-z0-9-]+/?$ {
        root /var/www/zhejian/h5;
        try_files /city/index.html =404;
        access_log /var/www/zhejian/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location = /search {
        return 301 /search/;
    }

    location = /search/ {
        rewrite ^ /search/index.html last;
    }

    location = /search/index.html {
        alias /var/www/zhejian/h5/search/index.html;
        access_log /var/www/zhejian/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location /album/ {
        alias /var/www/zhejian/h5/album/;
        try_files $uri =404;
    }

    location /shared/ {
        alias /var/www/zhejian/h5/shared/;
        try_files $uri =404;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /fixtures/ {
        alias /var/www/zhejian/h5/fixtures/;
        try_files $uri =404;
    }

    location / {
        root /var/www/zhejian/h5;
        index index.html;
        try_files $uri $uri/ =404;
        access_log /var/www/zhejian/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }
}
