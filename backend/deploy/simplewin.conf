# simplewin.conf · ECS 生产 Nginx 真源（与 /etc/nginx/conf.d/simplewin.conf 保持同步）
#
# 部署：
#   sudo cp /var/www/zhejian/backend/deploy/simplewin.conf /etc/nginx/conf.d/simplewin.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# 端口约定：
#   simplewin.cn 官网 Next.js  → 127.0.0.1:3000
#   geo.simplewin.cn 辙见 API   → 127.0.0.1:3100（backend/.env PORT=3100）
#
# geo 块变更时请同步更新：backend/deploy/nginx-geo.simplewin.cn.conf（独立模板，含 __SSL_*__ 占位符）

server {
    listen 80 default_server;
    server_name 8.155.0.128 _ localhost;
    root /var/www/simplewin/web/dist;
    index index.html;

    location = /h5 {
        return 302 /h5/tools;
    }

    location ^~ /h5/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /uploads/ {
        alias /var/www/simplewin/web/uploads/;
        autoindex on;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 80;
    server_name simplewin.cn;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name simplewin.cn;
    root /var/www/simplewin/web/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/simplewin.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/simplewin.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = /h5 {
        return 302 /h5/tools;
    }

    location ^~ /h5/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /uploads/ {
        alias /var/www/simplewin/web/uploads/;
        autoindex on;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── geo.simplewin.cn · 辙见（API :3100 + H5 静态 /var/www/zhejian/h5）────────
server {
    listen 80;
    server_name geo.simplewin.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name geo.simplewin.cn;

    ssl_certificate /etc/letsencrypt/live/geo.simplewin.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/geo.simplewin.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    location /media/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    location = /admin {
        return 301 /admin/;
    }
    location /admin/ {
        alias /var/www/zhejian/admin-web/placeholder/;
        index index.html;
    }

    location = /case {
        return 301 /case/;
    }

    # 案例列表 index.html；alias 不可与 try_files 同用（403）
    location /case/ {
        alias /var/www/zhejian/h5/case/;
        index index.html;
    }

    # 门店列表 /store/（index.html）；详情 PRD：/store/{store_id}.html
    location = /store {
        return 301 /store/;
    }

    location = /store/view.html {
        alias /var/www/zhejian/h5/store/view.html;
    }

    location ~ ^/store/[a-zA-Z0-9_-]+\.html$ {
        root /var/www/zhejian/h5;
        try_files /store/view.html =404;
    }

    location /store/ {
        alias /var/www/zhejian/h5/store/;
        index index.html;
    }

    location /album/ {
        alias /var/www/zhejian/h5/album/;
        try_files $uri =404;
    }

    location /shared/ {
        alias /var/www/zhejian/h5/shared/;
        try_files $uri =404;
    }

    location /fixtures/ {
        alias /var/www/zhejian/h5/fixtures/;
        try_files $uri =404;
    }

    location / {
        root /var/www/zhejian/h5;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
