# staging.geo.simplewin.cn · 辙见预发（API :3101 + H5 /var/www/zhejian-staging/h5）
#
# 【勿覆盖生产 simplewin.conf】本文件单独部署：
#   sudo cp /var/www/zhejian-staging/backend/deploy/nginx-staging.geo.simplewin.cn.conf \
#     /etc/nginx/conf.d/staging.geo.simplewin.cn.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# 证书（首次）：
#   sudo certbot certonly --nginx -d staging.geo.simplewin.cn
# 若 certbot 尚未有证书，可先只启用 listen 80 的跳转块，签完证再 reload。
#
# 端口约定：生产 geo → 3100；预发 staging → 3101

server {
    listen 80;
    server_name staging.geo.simplewin.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name staging.geo.simplewin.cn;

    ssl_certificate /etc/letsencrypt/live/staging.geo.simplewin.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.geo.simplewin.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 240s;
        proxy_read_timeout 240s;
    }

    location /media/ {
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }

    location = /admin {
        return 301 /admin/;
    }

    location ^~ /admin/assets/ {
        alias /var/www/zhejian-staging/admin-web/dist/assets/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location = /admin/index.html {
        alias /var/www/zhejian-staging/admin-web/dist/index.html;
        expires -1;
    }

    location = /admin/ {
        rewrite ^ /admin/index.html last;
    }

    location ~ ^/admin/(?!assets/).+ {
        rewrite ^ /admin/index.html last;
    }

    location = /robots.txt {
        proxy_pass http://127.0.0.1:3101/api/v1/public/robots.txt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /llms.txt {
        proxy_pass http://127.0.0.1:3101/api/v1/public/llms.txt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /feeds/topics.xml {
        proxy_pass http://127.0.0.1:3101/api/v1/public/feeds/topics.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /public/v1/ {
        proxy_pass http://127.0.0.1:3101/api/v1/public/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 240s;
        add_header Cache-Control "public, max-age=300" always;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3101/api/v1/public/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/sitemap-[a-z]+\.xml$ {
        rewrite ^/(sitemap-[a-z]+\.xml)$ /api/v1/public/$1 break;
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /case {
        return 301 /case/;
    }

    location = /case/view.html {
        if ($crawler_bot_type != "") {
            rewrite ^ /api/v1/public/h5/case/$arg_id/bot-html? last;
        }
        set $case_slug_redirect 0;
        if ($arg_id != "") {
            set $case_slug_redirect 1;
        }
        if ($arg_legacy = "1") {
            set $case_slug_redirect 0;
        }
        if ($case_slug_redirect = 1) {
            rewrite ^ /api/v1/public/h5/case-redirect?id=$arg_id? last;
        }
        alias /var/www/zhejian-staging/h5/case/view.html;
        access_log /var/www/zhejian-staging/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location ~ ^/case/(?!index\.html$)[a-zA-Z0-9_-]+\.html$ {
        if ($crawler_bot_type != "") {
            rewrite ^/case/([a-zA-Z0-9_-]+)\.html$ /api/v1/public/h5/case/$1/bot-html? last;
        }
        root /var/www/zhejian-staging/h5;
        try_files /case/view.html =404;
        access_log /var/www/zhejian-staging/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location /case/ {
        alias /var/www/zhejian-staging/h5/case/;
        index index.html;
        access_log /var/www/zhejian-staging/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location = /store {
        return 301 /store/;
    }

    location = /store/ {
        rewrite ^ /store/index.html last;
    }

    location = /store/index.html {
        alias /var/www/zhejian-staging/h5/store/index.html;
        access_log /var/www/zhejian-staging/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location = /store/view.html {
        alias /var/www/zhejian-staging/h5/store/view.html;
        access_log /var/www/zhejian-staging/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location ~ ^/store/[a-zA-Z0-9_-]+/cases/?$ {
        root /var/www/zhejian-staging/h5;
        try_files /store/cases.html =404;
        access_log /var/www/zhejian-staging/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location ~ ^/store/([a-zA-Z0-9_-]+)\.html$ {
        set $store_id $1;
        if ($http_user_agent ~* "(GPTBot|ChatGPT-User|ClaudeBot|Claude-Web|Googlebot|bingbot|Bytespider|PerplexityBot|Amazonbot)") {
            rewrite ^ /api/v1/public/h5/stores/$store_id/bot-html? last;
        }
        root /var/www/zhejian-staging/h5;
        try_files /store/view.html =404;
        access_log /var/www/zhejian-staging/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location = /service/view.html {
        alias /var/www/zhejian-staging/h5/service/view.html;
        access_log /var/www/zhejian-staging/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location ~ ^/service/[a-zA-Z0-9_-]+/cases/?$ {
        root /var/www/zhejian-staging/h5;
        try_files /service/cases.html =404;
        access_log /var/www/zhejian-staging/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location ~ ^/service/[a-zA-Z0-9_-]+\.html$ {
        root /var/www/zhejian-staging/h5;
        try_files /service/view.html =404;
        access_log /var/www/zhejian-staging/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location ~ ^/topic/[a-z0-9-]+/?$ {
        root /var/www/zhejian-staging/h5;
        try_files /topic/index.html =404;
        access_log /var/www/zhejian-staging/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location = /city {
        return 301 /city/hangzhou;
    }

    location ~ ^/city/[a-z0-9-]+/?$ {
        root /var/www/zhejian-staging/h5;
        try_files /city/index.html =404;
        access_log /var/www/zhejian-staging/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location = /search {
        return 301 /search/;
    }

    location = /search/ {
        rewrite ^ /search/index.html last;
    }

    location = /search/index.html {
        alias /var/www/zhejian-staging/h5/search/index.html;
        access_log /var/www/zhejian-staging/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }

    location /album/ {
        alias /var/www/zhejian-staging/h5/album/;
        try_files $uri =404;
    }

    location /shared/ {
        alias /var/www/zhejian-staging/h5/shared/;
        try_files $uri =404;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /fixtures/ {
        alias /var/www/zhejian-staging/h5/fixtures/;
        try_files $uri =404;
    }

    location / {
        root /var/www/zhejian-staging/h5;
        index index.html;
        try_files $uri $uri/ =404;
        access_log /var/www/zhejian-staging/backend/logs/crawler-access.log crawler_track if=$log_crawler;
    }
}
