# B-TRACK-04 · 爬虫 UA 识别（须在 nginx.conf 的 http { } 内 include）
#
#   include /var/www/zhejian/backend/deploy/nginx-http-crawler-map.conf;
#
# geo.simplewin.cn 各公开页 location 追加（示例）：
#   access_log /var/www/zhejian/backend/logs/crawler-access.log crawler_track if=$log_crawler;

map $http_user_agent $crawler_bot_type {
    default "";
    ~*GPTBot                          gptbot;
    ~*ChatGPT-User                    chatgpt-user;
    ~*ClaudeBot                       claudebot;
    ~*anthropic-ai                    claudebot;
    ~*Googlebot                       googlebot;
    ~*bingbot                         bingbot;
    ~*Baiduspider                     baiduspider;
    ~*Sogou                           sogou;
    ~*360Spider                       360spider;
    ~*Bytespider                      bytespider;
    ~*PerplexityBot                   perplexitybot;
    ~*Applebot                        applebot;
    ~*meta-externalagent              meta-external;
    ~*FacebookBot                     meta-external;
}

map $crawler_bot_type $log_crawler {
    default 0;
    ""      0;
    ~.+     1;
}

log_format crawler_track '$time_iso8601|$request_uri|$http_user_agent|$crawler_bot_type|$remote_addr';
